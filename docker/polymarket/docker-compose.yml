# Plokymarket Central Docker Configuration
# Project: Polymarket for Bangladesh
# Location: docker/polymarket/
#
# Usage:
#   cd docker/polymarket
#   docker-compose up -d
#   docker-compose ps
#
# ⚠️ SAFETY FEATURES ENABLED:
#   - restart: unless-stopped on all containers
#   - Named volumes with polymarket- prefix
#   - Protection labels to prevent accidental deletion
#   - Health checks on all critical services
#   - Separate n8n automation (see automation/ folder)

version: '3.8'

services:
  # ============================================
  # DATABASE LAYER
  # ============================================

  postgres:
    image: postgres:15-alpine
    container_name: polymarket-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket_secure_pass_2024}
      POSTGRES_DB: polymarket
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - polymarket-db-data:/var/lib/postgresql/data
    networks:
      - polymarket-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d polymarket" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      com.plokymarket.project: "polymarket"
      com.plokymarket.component: "database"
      com.plokymarket.protection: "critical"
      description: "PostgreSQL 15 database for Polymarket"
    stop_grace_period: 60s
    mem_limit: 2g
    cpus: 1.0

  postgrest:
    image: postgrest/postgrest:v12.0.1
    container_name: polymarket-postgrest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-polymarket_secure_pass_2024}@postgres:5432/polymarket
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-your_jwt_secret_here}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_DB_PREPARED_STATEMENTS: "true"
    volumes: []
    networks:
      - polymarket-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      com.plokymarket.project: "polymarket"
      com.plokymarket.component: "api-gateway"
      com.plokymarket.protection: "high"
      description: "PostgREST auto-generated REST API"
    mem_limit: 512m
    cpus: 0.5

  # ============================================
  # AI SERVICES
  # ============================================

  kyc-ai:
    build:
      context: ../../apps/ai-kyc
      dockerfile: Dockerfile
    container_name: polymarket-kyc-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - KYC_DB_PATH=/app/data/kyc.db
      - LOG_LEVEL=INFO
    volumes:
      - polymarket-kyc-data:/app/data
    networks:
      - polymarket-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.plokymarket.project: "polymarket"
      com.plokymarket.component: "ai-service"
      com.plokymarket.protection: "high"
      description: "KYC document verification with OCR"
    stop_grace_period: 30s
    mem_limit: 1g
    cpus: 1.0
  # ============================================
  # MONITORING (Optional)
  # ============================================

  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: polymarket-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - polymarket-prometheus-data:/prometheus
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   networks:
  #     - polymarket-network
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #     - '--storage.tsdb.retention.time=30d'
  #   labels:
  #     com.plokymarket.project: "polymarket"
  #     com.plokymarket.component: "monitoring"

  # ============================================
  # VOLUMES - Docker managed, persist on disk
  # ============================================
volumes:
  polymarket-db-data:
    name: polymarket-postgres-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POLYMARKET_DATA_PATH:-./data/postgres}

  polymarket-kyc-data:
    name: polymarket-kyc-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POLYMARKET_DATA_PATH:-./data/kyc}
  # polymarket-prometheus-data:
  #   name: polymarket-prometheus-data
  #   driver: local

  # ============================================
  # NETWORKS
  # ============================================
networks:
  polymarket-network:
    name: polymarket-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
