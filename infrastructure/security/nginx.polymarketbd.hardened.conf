# ════════════════════════════════════════════════════════════════════════════════════════════════════════
# Plokymarket — Hardened Nginx Reverse Proxy + API Gateway
# Tier-1 Financial Grade — TLS 1.3 Only, WAF-Grade Rate Limiting, AI Routing
# ════════════════════════════════════════════════════════════════════════════════════════════════════════

# Rate limiting zones (MUST be in http block context)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=kyc_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=conn_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Geo-block high-risk jurisdictions (syllable: update paths)
geo $blocked_country {
    default 0;
    # Block OFAC-sanctioned / high-fraud jurisdictions
    # Use MaxMind GeoIP2 or Cloudflare CF-IPCountry header
    # Example: include /etc/nginx/conf.d/geo_blocks.conf;
}

map $blocked_country $allow_request {
    1 0;
    default 1;
}

# Upstream definitions with health checks
upstream minimax_backend {
    server 127.0.0.1:9001 max_fails=3 fail_timeout=30s;
    # Fallback to Vertex AI on MiniMax failure
    server 127.0.0.1:9002 backup;
    keepalive 32;
}

upstream vertex_backend {
    server 127.0.0.1:9002 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream nextjs_backend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

# ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name polymarketbd.com www.polymarketbd.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS Server ─────────────────────────────────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name polymarketbd.com www.polymarketbd.com;

    # ── TLS 1.3 ONLY ──────────────────────────────────────────────────────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/polymarketbd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/polymarketbd.com/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256";
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Anti-Slowloris / Timeout Hardening ──────────────────────────────────────────────────────────────────────────────────────────
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
    keepalive_timeout 30s;
    client_max_body_size 10m;

    # ── Security Headers (Tier-1 Grade) ──────────────────────────────────────────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Strict CSP — no unsafe-eval on trading panels
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'strict-dynamic' 'nonce-Pl0kyN0nce' https:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://sltcfmqefujecqfbmkvz.supabase.co wss://sltcfmqefujecqfbmkvz.supabase.co https://o4510975612420096.ingest.us.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # Geo-block gate
    if ($allow_request = 0) {
        return 403 "Access denied from your region.";
    }

    # ── Static Assets (Cache at Edge + Nginx) ──────────────────────────────────────────────────────────────────────────────────────────
    location /_next/static/ {
        alias /var/www/plokymarket-static/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
    }

    location /static/ {
        alias /var/www/plokymarket-static/public/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000" always;
        access_log off;
    }

    # ── AI Routing — Strict Isolation ────────────────────────────────────────────────────────────────────────────────────────────────────────

    # Vertex AI — KYC ONLY (strict isolation)
    location /api/kyc/ {
        limit_req zone=kyc_limit burst=10 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://vertex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-AI-Provider "vertex";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Vertex-only: no fallback (KYC must not leak to MiniMax)
        proxy_intercept_errors off;
    }

    # MiniMax m2.7 — Core AI (with Vertex fallback on 502/504)
    location /api/ai/ {
        limit_req zone=ai_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://minimax_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-AI-Provider "minimax";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Fallback: 502/504 → Vertex AI
        proxy_intercept_errors on;
        error_page 502 504 = @vertex_fallback;
    }

    # Fallback route for MiniMax failures
    location @vertex_fallback {
        proxy_pass http://vertex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-AI-Provider "vertex-fallback";
        proxy_set_header X-Fallback-Reason "minimax_unavailable";
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        add_header X-AI-Fallback "vertex" always;
    }

    # ── Supabase APIs ────────────────────────────────────────────────────────────────────────────────────────────────────────────

    location /rest/v1/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/v1/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket / Realtime ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

    location /socket.io/ {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Next.js App (catch-all) ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────

    location / {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
