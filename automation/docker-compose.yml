version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.70.0
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${N8N_HOST:-localhost}:5678/
      - GENERIC_TIMEZONE=Asia/Dhaka
      - N8N_SECURE_COOKIE=false
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - automation_net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:5678/rest/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - n8n-playwright

  n8n-playwright:
    image: browserless/chrome:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
    networks:
      - automation_net

volumes:
  n8n_data:
    name: polymarket-automation-n8n-data

networks:
  automation_net:
    name: polymarket_automation_net
    driver: bridge
