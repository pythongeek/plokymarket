version: '3.8'

services:
  # 0. Local Supabase (PostgreSQL + PostgREST)
  postgres:
    image: postgres:15-alpine
    container_name: polymarket-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: polymarket
    volumes:
      - supabase-data:/var/lib/postgresql/data
    networks:
      - polymarket_plus_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.0.1
    container_name: polymarket-postgrest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/polymarket
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - polymarket_plus_net

  # 1. Main n8n Instance (General Logic)
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.70.0
    container_name: polymarket-n8n-main
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${N8N_HOST:-localhost}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Dhaka}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - polymarket_plus_net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:5678/rest/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. Browserless Chrome (For n8n Scraping)
  n8n-playwright:
    image: browserless/chrome:latest
    container_name: polymarket-playwright
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
    networks:
      - polymarket_plus_net

  # 3. Isolated P2P Scraper (Dedicated n8n Instance)
  n8n-p2p:
    image: n8nio/n8n:1.70.0
    container_name: polymarket-n8n-p2p
    restart: unless-stopped
    ports:
      - "${N8N_P2P_PORT:-5680}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_P2P_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_P2P_BASIC_AUTH_PASSWORD}
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios,cheerio,puppeteer
      - BINANCE_AFFILIATE_CODE=${BINANCE_AFFILIATE_CODE}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
    volumes:
      - n8n_p2p_data:/home/node/.n8n
    networks:
      - polymarket_plus_net

  # 4. AI-KYC Service (FastAPI)
  kyc-ai:
    build:
      context: ./apps/ai-kyc
      dockerfile: Dockerfile
    container_name: polymarket-kyc-ai
    restart: unless-stopped
    ports:
      - "${KYC_AI_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - polymarket_plus_net

volumes:
  supabase-data:
    name: polymarket-supabase-data
  n8n_data:
    name: polymarket-n8n-data
  n8n_p2p_data:
    name: polymarket-n8n-p2p-data

networks:
  polymarket_plus_net:
    name: polymarket_plus_net
    driver: bridge
